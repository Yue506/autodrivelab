project_name: iqa_mobilenetv2
seed: 42

data:
  root: data/woodscape_iqa
  train_dir: data/woodscape_iqa/train
  val_dir: data/woodscape_iqa/val
  test_dir: data/woodscape_iqa/test
  num_classes: 2
  class_names:
    - normal
    - soiling

model:
  name: mobilenet_v2
  pretrained: true
  num_classes: 2

train:
  image_size: 224
  batch_size: 64
  epochs: 200
  num_workers: 8
  optimizer: adamw
  learning_rate: 0.0001
  weight_decay: 0.0001
  scheduler: cosine
  label_smoothing: 0.0
  early_stopping_patience: 30
  metric_for_best: f1
  amp: true

augmentation:
  train:
    random_resized_crop: true
    horizontal_flip: true
    color_jitter: true
    rotation: 5
  val_test:
    resize: 256
    center_crop: 224

output:
  root: outputs/iqa_mobilenetv2
  checkpoints: outputs/iqa_mobilenetv2/checkpoints
  logs: outputs/iqa_mobilenetv2/logs
  figures: outputs/iqa_mobilenetv2/figures
  metrics: outputs/iqa_mobilenetv2/metrics
  samples: outputs/iqa_mobilenetv2/samples
